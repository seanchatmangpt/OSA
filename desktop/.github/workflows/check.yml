name: CI Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel stale runs for the same PR / branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # --------------------------------------------------------------------------- #
  # Frontend: TypeScript + Svelte type checking
  # --------------------------------------------------------------------------- #
  svelte-check:
    name: svelte-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install npm dependencies
        run: npm ci --prefer-offline

      - name: Sync SvelteKit types
        run: npx svelte-kit sync

      - name: Run svelte-check
        run: npm run check

  # --------------------------------------------------------------------------- #
  # Frontend: ESLint + Prettier
  # --------------------------------------------------------------------------- #
  lint:
    name: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install npm dependencies
        run: npm ci --prefer-offline

      - name: Run prettier (format check)
        run: npx prettier --check .

      - name: Run eslint
        run: npx eslint .

  # --------------------------------------------------------------------------- #
  # Backend: cargo check — verifies the Rust code compiles
  # --------------------------------------------------------------------------- #
  cargo-check:
    name: cargo check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install Tauri Linux system dependencies (needed for cargo check to succeed)
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: cargo check
        working-directory: src-tauri
        run: cargo check

  # --------------------------------------------------------------------------- #
  # Backend: cargo clippy — lint the Rust code
  # --------------------------------------------------------------------------- #
  cargo-clippy:
    name: cargo clippy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Rust stable (with clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: cargo clippy
        working-directory: src-tauri
        # -D warnings treats all clippy warnings as errors
        run: cargo clippy -- -D warnings

  # --------------------------------------------------------------------------- #
  # Backend: cargo fmt — ensure consistent Rust formatting
  # --------------------------------------------------------------------------- #
  cargo-fmt:
    name: cargo fmt
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust stable (with rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt check
        working-directory: src-tauri
        run: cargo fmt --check

  # --------------------------------------------------------------------------- #
  # All checks gate — PRs can require this as a single branch protection rule
  # --------------------------------------------------------------------------- #
  all-checks:
    name: All checks passed
    needs:
      - svelte-check
      - lint
      - cargo-check
      - cargo-clippy
      - cargo-fmt
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Evaluate results
        run: |
          results='${{ toJSON(needs) }}'
          failed=$(echo "$results" | jq -r 'to_entries[] | select(.value.result != "success") | .key')
          if [ -n "$failed" ]; then
            echo "The following checks failed:"
            echo "$failed"
            exit 1
          fi
          echo "All checks passed."
