name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch on new pushes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin Node version across all jobs
  NODE_VERSION: '20'

jobs:
  # --------------------------------------------------------------------------- #
  # Build matrix — macOS (arm64 + x86_64), Linux, Windows
  # --------------------------------------------------------------------------- #
  build:
    name: Build — ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: write  # needed for release artifact upload

    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS arm64
            runner: macos-latest          # M-series runner (arm64)
            target: aarch64-apple-darwin
            artifact-glob: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

          - name: macOS x86_64
            runner: macos-13              # Intel runner
            target: x86_64-apple-darwin
            artifact-glob: |
              src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app
              src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

          - name: Ubuntu
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact-glob: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/deb/*.deb

          - name: Windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact-glob: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe

    steps:
      # ----------------------------------------------------------------------- #
      # Checkout
      # ----------------------------------------------------------------------- #
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------------------------------------------------- #
      # Platform: Ubuntu — install Tauri system dependencies
      # ----------------------------------------------------------------------- #
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            file

      # ----------------------------------------------------------------------- #
      # Node.js
      # ----------------------------------------------------------------------- #
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      # ----------------------------------------------------------------------- #
      # Rust — stable toolchain with target-specific cross-compile support
      # ----------------------------------------------------------------------- #
      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      # Cache Rust build artifacts (keyed on Cargo.lock for determinism)
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.platform.target }}

      # ----------------------------------------------------------------------- #
      # Install JS dependencies
      # ----------------------------------------------------------------------- #
      - name: Install npm dependencies
        run: npm ci --prefer-offline

      # ----------------------------------------------------------------------- #
      # Build — macOS cross-compile targets need --target flag
      # ----------------------------------------------------------------------- #
      - name: Build (macOS cross-compile)
        if: runner.os == 'macOS'
        run: npm run tauri:build -- --target ${{ matrix.platform.target }}
        env:
          # Prevent notarization in CI (no Apple credentials)
          APPLE_SIGNING_IDENTITY: '-'

      - name: Build (Linux / Windows)
        if: runner.os != 'macOS'
        run: npm run tauri:build

      # ----------------------------------------------------------------------- #
      # Collect build artifacts
      # ----------------------------------------------------------------------- #
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: osa-desktop-${{ matrix.platform.name }}
          # Upload every artifact type produced for this platform
          path: |
            src-tauri/target/**/bundle/macos/*.app
            src-tauri/target/**/bundle/dmg/*.dmg
            src-tauri/target/**/bundle/appimage/*.AppImage
            src-tauri/target/**/bundle/deb/*.deb
            src-tauri/target/**/bundle/rpm/*.rpm
            src-tauri/target/**/bundle/msi/*.msi
            src-tauri/target/**/bundle/nsis/*.exe
          if-no-files-found: warn
          compression-level: 6

  # --------------------------------------------------------------------------- #
  # Release — runs only on version tags (v*)
  # --------------------------------------------------------------------------- #
  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Download all artifacts from every matrix platform
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: osa-desktop-*
          merge-multiple: false

      - name: List release artifacts
        run: find dist/ -type f | sort

      # Flatten to a single directory for release upload
      - name: Flatten artifact directories
        run: |
          mkdir -p release-assets
          find dist/ -type f \( \
            -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" \
            -o -name "*.rpm" -o -name "*.msi" -o -name "*.exe" \
          \) -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "OSA Desktop ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # v1.0.0-beta is pre-release
          generate_release_notes: true
          files: release-assets/*
          body: |
            ## OSA Desktop ${{ github.ref_name }}

            ### Downloads

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `OSA_*_aarch64.dmg` |
            | macOS (Intel)         | `OSA_*_x64.dmg` |
            | Linux                 | `OSA_*.AppImage`, `OSA_*.deb` |
            | Windows               | `OSA_*.msi`, `OSA_*.exe` |

            ### macOS Gatekeeper
            If macOS blocks the app on first launch, right-click the app and choose **Open**.

            ### Linux (AppImage)
            ```bash
            chmod +x OSA_*.AppImage
            ./OSA_*.AppImage
            ```
